<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>遥控 | 智能家居管家机器人</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=manual-hold-v1" />
  </head>
  <body data-page="control">
    <div class="app-shell">
      <aside class="neon-rail">
        <a class="brand" href="/dashboard">
          <span class="brand-mark">IC</span>
          <span><strong>HomeBot</strong><small>智能家居管家机器人</small></span>
        </a>
        <nav class="rail-nav">
          <a href="/dashboard">总览</a>
          <a class="active" href="/control">遥控</a>
          <a href="/navigation">导航</a>
          <a href="/cruise">巡航</a>
          <a href="/vision">视觉</a>
          <a href="/alarms">告警</a>
          <a href="/reports">报告</a>
        </nav>
        <div class="rail-card"><span class="pulse-dot" id="railDot"></span><span id="railStatus">离线</span></div>
      </aside>
      <main class="page">
        <header class="page-head">
          <div>
            <p class="eyebrow">Manual Drive</p>
            <h1>小车遥控</h1>
            <p class="subhead">用于现场低速联调，急停优先级最高。</p>
          </div>
          <div class="connect-strip">
            <input id="serverInput" value="" placeholder="ws://当前页面主机/ws" />
            <button class="neon-btn primary" id="connectBtn">连接</button>
            <button class="neon-btn ghost" id="disconnectBtn">断开</button>
          </div>
        </header>
        <section class="control-layout">
          <article class="panel glow-panel">
            <div class="panel-title"><h2>运动控制</h2><p id="connectionState">离线</p></div>
            <div class="speed-row">
              <label for="speedRange">速度</label>
              <input id="speedRange" type="range" min="0.08" max="0.32" value="0.16" step="0.02" />
              <strong id="speedValue">0.16 m/s</strong>
            </div>
            <div class="neon-dpad">
              <button data-dir="forward">前</button>
              <button data-dir="left">左</button>
              <button data-dir="stop" class="stop">停</button>
              <button data-dir="right">右</button>
              <button data-dir="backward">后</button>
            </div>
            <button class="neon-btn danger wide" id="estopBtn">急停</button>
          </article>
          <article class="panel glow-panel">
            <div class="panel-title"><h2>小车状态</h2><p>来自后端统一状态中心</p></div>
            <div class="status-list">
              <div><span>模式</span><strong id="robotMode">--</strong></div>
              <div><span>目标</span><strong id="robotTarget">无</strong></div>
              <div><span>电量</span><strong id="batteryText">--%</strong></div>
              <div><span>进度</span><strong id="navProgressText">0%</strong></div>
              <div><span>错误</span><strong id="robotError">无</strong></div>
            </div>
            <button class="neon-btn primary wide" id="reconnectCarBtn">重连小车</button>
          </article>
          <article class="panel glow-panel">
            <div class="panel-title"><h2>外设与模式</h2><p id="auxResult">等待指令</p></div>
            <div class="aux-grid">
              <button class="aux-button" id="lightToggleBtn" data-enabled="false">
                <strong>灯光</strong><span>冷光开/关</span>
              </button>
              <button class="aux-button" id="buzzerBtn">
                <strong>蜂鸣</strong><span>提示音</span>
              </button>
              <button class="aux-button" id="voicePlayBtn">
                <strong>语音</strong><span>主人，我在</span>
              </button>
              <button class="aux-button" id="followLineBtn" data-enabled="false">
                <strong>循迹</strong><span>黑线跟随</span>
              </button>
            </div>
          </article>
        </section>
        <section class="voice-layout">
          <article class="panel glow-panel">
            <div class="panel-title">
              <h2>语音调试</h2>
              <p>只有启动调试监听后，浏览器才会本地监听；检测到有人说话后才上传腾讯云。</p>
            </div>
            <div class="voice-toolbar">
              <button class="neon-btn primary" id="voiceToggleBtn">启动调试监听</button>
              <div class="voice-pill" id="voiceStatusPill">未启动</div>
            </div>
            <div class="voice-meter" aria-hidden="true">
              <span id="voiceLevelBar"></span>
            </div>
            <div class="voice-grid">
              <div><span>本地状态</span><strong id="voiceLocalState">待机</strong></div>
              <div><span>唤醒词</span><strong id="voiceWakePhrase">小比 / 小比小比 / 比格 / 小比格</strong></div>
              <div><span>腾讯云识别</span><strong id="voiceTranscript">--</strong></div>
              <div><span>LLM 输出</span><strong id="voiceLlmOutput">--</strong></div>
            </div>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/js/app.js?v=manual-hold-v1"></script>
  </body>
</html>
