<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>总览 | 智能家居管家机器人</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="dashboard">
    <div class="app-shell">
      <aside class="neon-rail">
        <a class="brand" href="/dashboard">
          <span class="brand-mark">IC</span>
          <span><strong>HomeBot</strong><small>智能家居管家机器人</small></span>
        </a>
        <nav class="rail-nav">
          <a class="active" href="/dashboard">总览</a>
          <a href="/control">遥控</a>
          <a href="/navigation">导航</a>
          <a href="/cruise">巡航</a>
          <a href="/vision">视觉</a>
          <a href="/alarms">告警</a>
          <a href="/reports">报告</a>
        </nav>
        <div class="rail-card">
          <span class="pulse-dot" id="railDot"></span>
          <span id="railStatus">离线</span>
        </div>
      </aside>
      <main class="page">
        <header class="page-head">
          <div>
            <p class="eyebrow">Live Mission Center</p>
            <h1>家庭管家总览</h1>
            <p class="subhead">实时查看小车在线状态、导航任务、家庭环境数据和最近异常。</p>
          </div>
          <div class="connect-strip">
            <input id="serverInput" value="" placeholder="ws://当前页面主机/ws" aria-label="WebSocket 服务地址" />
            <button class="neon-btn primary" id="connectBtn">连接</button>
            <button class="neon-btn ghost" id="disconnectBtn">断开</button>
          </div>
        </header>
        <section class="hero-grid">
          <article class="hero-card">
            <span>连接状态</span>
            <strong id="connectionState">离线</strong>
            <small id="adapterText">adapter --</small>
          </article>
          <article class="hero-card">
            <span>运行模式</span>
            <strong id="robotMode">--</strong>
            <small id="robotTarget">目标：无</small>
          </article>
          <article class="hero-card">
            <span>电量</span>
            <strong id="batteryText">--%</strong>
            <small>模拟/真车统一状态</small>
          </article>
          <article class="hero-card">
            <span>导航进度</span>
            <strong id="navProgressText">0%</strong>
            <small id="navMessage">等待任务</small>
          </article>
        </section>
        <section class="two-col">
          <article class="panel glow-panel">
            <div class="panel-title">
              <h2>环境传感器</h2>
              <p>温湿度、光照、气体与空气质量</p>
            </div>
            <div class="sensor-grid" id="sensorGrid"></div>
          </article>
          <article class="panel glow-panel">
            <div class="panel-title">
              <h2>最近事件</h2>
              <p>视觉识别、告警和巡逻报告</p>
            </div>
            <div class="timeline" id="dashboardTimeline"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/js/app.js"></script>
  </body>
</html>
