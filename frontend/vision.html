<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>视觉 | 智能家居管家机器人</title>
    <link rel="stylesheet" href="/assets/css/styles.css?v=manual-hold-v1" />
  </head>
  <body data-page="vision">
    <div class="app-shell">
      <aside class="neon-rail">
        <a class="brand" href="/dashboard"><span class="brand-mark">IC</span><span><strong>HomeBot</strong><small>智能家居管家机器人</small></span></a>
        <nav class="rail-nav">
          <a href="/dashboard">总览</a><a href="/control">遥控</a><a href="/navigation">导航</a><a href="/cruise">巡航</a><a class="active" href="/vision">视觉</a><a href="/alarms">告警</a><a href="/reports">报告</a>
        </nav>
        <div class="rail-card"><span class="pulse-dot" id="railDot"></span><span id="railStatus">离线</span></div>
      </aside>
      <main class="page">
        <header class="page-head">
          <div><p class="eyebrow">YOLO / OpenCV</p><h1>视觉识别</h1><p class="subhead" id="visionSummary">等待检测结果</p></div>
          <div class="connect-strip"><input id="serverInput" value="" placeholder="ws://当前页面主机/ws" /><button class="neon-btn primary" id="connectBtn">连接</button><button class="neon-btn ghost" id="disconnectBtn">断开</button></div>
        </header>
        <section class="vision-layout">
          <article class="panel glow-panel vision-camera-panel">
            <div class="panel-title">
              <h2>实时画面</h2>
              <p id="cameraStatus">等待摄像头</p>
            </div>
            <div class="camera-toolbar vision-camera-toolbar">
              <select id="cameraSelect"></select>
              <button class="neon-btn primary" id="reconnectCarBtn">重连小车</button>
              <button class="neon-btn primary" id="cameraAutoBtn">自动连接</button>
              <button class="neon-btn ghost" id="cameraNextBtn">下一个</button>
              <button class="neon-btn ghost" id="cameraStopBtn">停止</button>
            </div>
            <div class="video-frame vision-live-frame">
              <img id="visionImage" alt="视觉检测画面" src="/assets/sample-detection.svg" />
            </div>
          </article>
          <article class="panel glow-panel vision-detect-panel">
            <div class="panel-title">
              <h2>检测控制</h2>
              <p id="visionModeHint">开始检测后切到带框视频，识别结果变化时记录事件。</p>
            </div>
            <div class="vision-action-grid">
              <label class="vision-field">模式<select id="visionModeSelect"></select></label>
              <label class="vision-field vision-target-field" id="visionTargetField">
                <span>搜索目标 <small id="visionTargetHint">可多选，命中任意目标会生成报告</small></span>
                <select id="visionTargetSelect" multiple size="5" aria-label="搜索目标多选"></select>
              </label>
              <div class="vision-button-row">
                <button class="neon-btn primary" id="detectBtn">检测一次</button>
                <button class="neon-btn primary" id="visionStartBtn">开始检测</button>
                <button class="neon-btn ghost" id="visionStopBtn">停止检测</button>
              </div>
            </div>
            <div class="panel-title compact-title">
              <h2>检测结果图</h2>
              <p id="detectionImageStatus">等待检测</p>
            </div>
            <div class="detection-frame"><img id="detectionImage" alt="YOLO 检测结果图" src="/assets/sample-detection.svg" /></div>
          </article>
          <article class="panel glow-panel vision-events-panel">
            <div class="panel-title"><h2>检测事件</h2><p>类别、置信度、时间戳</p></div>
            <div class="timeline" id="visionList"></div>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/js/app.js?v=manual-hold-v1"></script>
  </body>
</html>
