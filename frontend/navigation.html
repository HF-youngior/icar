<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>导航 | 智能家居管家机器人</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="navigation">
    <div class="app-shell">
      <aside class="neon-rail">
        <a class="brand" href="/dashboard"><span class="brand-mark">IC</span><span><strong>HomeBot</strong><small>智能家居管家机器人</small></span></a>
        <nav class="rail-nav">
          <a href="/dashboard">总览</a><a href="/control">遥控</a><a class="active" href="/navigation">导航</a><a href="/vision">视觉</a><a href="/alarms">告警</a><a href="/reports">报告</a>
        </nav>
        <div class="rail-card"><span class="pulse-dot" id="railDot"></span><span id="railStatus">离线</span></div>
      </aside>
      <main class="page">
        <header class="page-head">
          <div><p class="eyebrow">Room Navigation</p><h1>房间导航与巡逻</h1><p class="subhead" id="navMessage">等待任务</p></div>
          <div class="connect-strip"><input id="serverInput" value="" placeholder="ws://当前页面主机/ws" /><button class="neon-btn primary" id="connectBtn">连接</button><button class="neon-btn ghost" id="disconnectBtn">断开</button></div>
        </header>
        <section class="nav-layout">
          <article class="panel glow-panel map-panel">
            <div class="panel-title"><h2>家庭地图</h2><p>模拟点位，可替换为真实 SLAM 地图坐标</p></div>
            <canvas id="homeMap" width="900" height="520"></canvas>
            <div class="progress-wrap"><div class="progress-bar"><span id="navProgress"></span></div><strong id="navProgressText">0%</strong></div>
          </article>
          <article class="panel glow-panel">
            <div class="panel-title"><h2>房间点位</h2><p>点击后启动单点导航</p></div>
            <div class="action-list" id="pointList"></div>
          </article>
          <article class="panel glow-panel">
            <div class="panel-title"><h2>巡逻路线</h2><p>适合夜间警卫和空气采集</p></div>
            <div class="action-list" id="routeList"></div>
            <button class="neon-btn danger wide" id="stopTaskBtn">停止任务</button>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/js/app.js"></script>
  </body>
</html>
