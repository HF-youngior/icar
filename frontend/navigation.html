<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>导航 | 智能家居管家机器人</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body data-page="navigation">
    <div class="app-shell">
      <aside class="neon-rail">
        <a class="brand" href="/dashboard"><span class="brand-mark">IC</span><span><strong>HomeBot</strong><small>智能家居管家机器人</small></span></a>
        <nav class="rail-nav">
          <a href="/dashboard">总览</a><a href="/control">遥控</a><a class="active" href="/navigation">导航</a><a href="/vision">视觉</a><a href="/alarms">告警</a><a href="/reports">报告</a>
        </nav>
        <div class="rail-card"><span class="pulse-dot" id="railDot"></span><span id="railStatus">离线</span></div>
      </aside>
      <main class="page">
        <header class="page-head">
          <div>
            <p class="eyebrow">SLAM & Navigation2</p>
            <h1>实车建图与自动导航</h1>
            <p class="subhead" id="navMessage">等待任务</p>
          </div>
          <div class="connect-strip">
            <input id="serverInput" value="" placeholder="ws://当前页面主机/ws" />
            <button class="neon-btn primary" id="connectBtn">连接</button>
            <button class="neon-btn ghost" id="disconnectBtn">断开</button>
          </div>
        </header>

        <section class="slam-layout">
          <article class="panel glow-panel slam-map-panel">
            <div class="panel-title">
              <h2>真实地图</h2>
              <p id="slamMapHint">选择小车上的 YAML 地图后，点击地图可填入真实 map 坐标。</p>
            </div>
            <div class="map-toolbar">
              <select id="slamMapSelect"></select>
              <button class="neon-btn ghost" id="slamRefreshMapsBtn">刷新地图</button>
              <button class="neon-btn ghost" id="slamReloadMapBtn">加载地图</button>
            </div>
            <div class="slam-map-frame">
              <canvas id="slamMapCanvas" width="900" height="620"></canvas>
            </div>
            <div class="coordinate-strip">
              <span>点击坐标：<strong id="slamClickCoord">--</strong></span>
              <span>地图：<strong id="slamMapMeta">--</strong></span>
            </div>
          </article>

          <article class="panel glow-panel">
            <div class="panel-title">
              <h2>一键流程</h2>
              <p>按课程 6.1/6.2 的实车链路启动 ROS2 节点。</p>
            </div>
            <div class="stacked-actions">
              <button class="neon-btn primary wide" id="slamStartMappingBtn">开始 SLAM 建图</button>
              <div class="inline-form">
                <input id="slamMapNameInput" value="yahboomcar_web" />
                <button class="neon-btn ghost" id="slamSaveMapBtn">保存地图</button>
              </div>
              <div class="inline-form">
                <select id="slamNavAlgorithm">
                  <option value="dwa">DWA 导航</option>
                  <option value="teb">TEB 导航</option>
                  <option value="rtabmap">RTABMap 导航</option>
                </select>
                <button class="neon-btn primary" id="slamStartNavBtn">启动导航</button>
              </div>
              <button class="neon-btn danger wide" id="slamStopBtn">停止 SLAM/导航</button>
            </div>
          </article>

          <article class="panel glow-panel">
            <div class="panel-title">
              <h2>位姿与目标</h2>
              <p>先设置初始位姿，再发送目标点。</p>
            </div>
            <div class="pose-grid">
              <label>X<input id="slamPoseX" type="number" step="0.05" value="0" /></label>
              <label>Y<input id="slamPoseY" type="number" step="0.05" value="0" /></label>
              <label>θ<input id="slamPoseTheta" type="number" step="0.05" value="0" /></label>
            </div>
            <div class="two-buttons">
              <button class="neon-btn ghost" id="slamSetInitialBtn">设为初始位姿</button>
              <button class="neon-btn primary" id="slamSendGoalBtn">发送导航目标</button>
            </div>
            <p class="form-note">地图坐标单位是米，θ 是弧度。点击地图会自动填入 X/Y。</p>
          </article>

          <article class="panel glow-panel">
            <div class="panel-title">
              <h2>运行状态</h2>
              <p>用于确认容器、ROS2 topic 和端口是否正常。</p>
            </div>
            <div class="status-list" id="slamStatusList"></div>
            <button class="neon-btn ghost wide" id="slamRefreshStatusBtn">刷新状态</button>
          </article>

          <article class="panel glow-panel slam-log-panel">
            <div class="panel-title">
              <h2>车端日志</h2>
              <p>建图/导航失败时先看这里。</p>
            </div>
            <pre id="slamLogs">暂无日志</pre>
          </article>
        </section>
      </main>
    </div>
    <script src="/assets/js/app.js"></script>
  </body>
</html>
