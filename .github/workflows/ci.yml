name: iCar Web CI

on:
  push:
    branches:
      - main
      - yyh
  pull_request:
    branches:
      - main
      - yyh
  workflow_dispatch:

jobs:
  test:
    name: Project checks and offline tests
    runs-on: ubuntu-latest

    env:
      ICAR_CAR_ADAPTER: simulated
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Compile Python sources
        run: python -m compileall backend/app scripts tests

      - name: Check project structure
        run: python scripts/check_project.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run migrated feature checks
        run: python scripts/test_migrated_features.py

  optional-cloud-check:
    name: Optional cloud configuration check
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    env:
      ICAR_CAR_ADAPTER: simulated
      ICAR_DB_HOST: ${{ secrets.ICAR_DB_HOST }}
      ICAR_DB_PORT: ${{ secrets.ICAR_DB_PORT || '3306' }}
      ICAR_DB_USER: ${{ secrets.ICAR_DB_USER }}
      ICAR_DB_PASSWORD: ${{ secrets.ICAR_DB_PASSWORD }}
      ICAR_DB_NAME: ${{ secrets.ICAR_DB_NAME }}
      TENCENT_SECRET_ID: ${{ secrets.TENCENT_SECRET_ID }}
      TENCENT_SECRET_KEY: ${{ secrets.TENCENT_SECRET_KEY }}
      TENCENT_ASR_APP_ID: ${{ secrets.TENCENT_ASR_APP_ID }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Show cloud integration configuration status
        run: |
          python - <<'PY'
          import os

          checks = {
              "Tencent Cloud ASR": ["TENCENT_SECRET_ID", "TENCENT_SECRET_KEY"],
              "LLM API": ["OPENAI_API_KEY", "OPENAI_MODEL"],
              "Tencent Cloud MySQL": ["ICAR_DB_HOST", "ICAR_DB_USER", "ICAR_DB_PASSWORD", "ICAR_DB_NAME"],
          }
          for name, keys in checks.items():
              configured = all(bool(os.getenv(key)) for key in keys)
              print(f"{name}: {'configured' if configured else 'not configured'}")
          PY

      - name: Optional Tencent Cloud MySQL connectivity check
        run: |
          if [ -n "$ICAR_DB_HOST" ] && [ -n "$ICAR_DB_USER" ] && [ -n "$ICAR_DB_PASSWORD" ] && [ -n "$ICAR_DB_NAME" ]; then
            python scripts/db_check.py
          else
            echo "Tencent Cloud MySQL secrets are not configured; skip db_check.py."
          fi
